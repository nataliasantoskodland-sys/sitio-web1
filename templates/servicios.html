
{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto mt-10 space-y-6">
    <h2 class="text-4xl font-bold text-indigo-700 mb-6">{{ titulo }}</h2>

    <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        {% for s in servicios %}
        <div class="bg-white rounded-3xl shadow-lg border border-gray-200 p-6">
            <h3 class="text-2xl font-semibold text-gray-800">{{ s.nombre }}</h3>
            <p class="text-gray-500 mt-2">Precio: <span class="font-semibold">${{ s.precio }}</span></p>
            <div class="mt-4">
                {% if s.disponible %}
                <span class="inline-flex items-center px-3 py-1 rounded-full bg-green-100 text-green-700">✅ Disponible</span>
                {% else %}
                <span class="inline-flex items-center px-3 py-1 rounded-full bg-red-100 text-red-700">❌ No disponible</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
