{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-white shadow-2xl rounded-3xl overflow-hidden">
        
        <!-- Encabezado del Formulario -->
        <div class="bg-indigo-700 p-6 text-white text-center">
            <h2 class="text-3xl font-bold">Contáctanos</h2>
            <p class="text-indigo-100 mt-2">Completa el formulario para enviarnos tus datos.</p>
        </div>

        <div class="p-8">
            
            <!-- ALERTA DE ERROR -->
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 animate-pulse">
                <div class="flex">
                    <div class="flex-shrink-0 text-red-500 text-xl">⚠️</div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700 font-medium">{{ error }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <!-- ALERTA DE ÉXITO -->
            {% if exito %}
            <div class="bg-green-50 border-l-4 border-green-500 p-4 mb-6">
                <div class="flex">
                    <div class="flex-shrink-0 text-green-500 text-xl">✅</div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700 font-bold">{{ exito }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <!-- FORMULARIO -->
            <form action="/contacto" method="POST" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ej: Juan Pérez"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition shadow-sm">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Correo Electrónico</label>
                        <input type="text" name="email" placeholder="correo@ejemplo.com"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
                        <input type="text" name="telefono" placeholder="300 123 4567"
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Mensaje (Opcional)</label>
                    <textarea name="mensaje" rows="3" 
                              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm"></textarea>
                </div>

                <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-800 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                    Enviar Registro Seguro
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
