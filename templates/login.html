{% extends "base.html" %} 
 
{% block content %} 
<div class="min-h-[80vh] flex items-center justify-center"> 
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md"> 
        <div class="text-center mb-8"> 
            <h2 class="text-3xl font-black text-slate-900">Bienvenido</h2> 
            <p class="text-slate-500">Ingresa tus credenciales para continuar</p> 
        </div> 
 
        <form action="/login" method="POST" class="space-y-6"> 
            <div> 
                <label class="block text-sm font-bold text-slate-700 mb-2">Usuario</label> 
                <input type="text" name="username" required  
                       class="w-full p-4 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"> 
            </div> 
            <div> 
                <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label> 
                <input type="password" name="password" required  
                       class="w-full p-4 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"> 
            </div> 
            <button type="submit"  
                    class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-black transition-colors"> 
                Entrar al Sistema 
            </button> 
        </form> 
 
        <p class="text-center mt-8 text-slate-500 text-sm"> 
            ¿No tienes cuenta? <a href="/registro" class="text-indigo-600 font-bold hover:underline">Regístrate gratis</a> 
        </p> 
    </div> 
</div> 
{% endblock %}
