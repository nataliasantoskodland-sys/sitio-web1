{% extends "base.html" %} 
 
{% block content %} 
<div class="min-h-[80vh] flex items-center justify-center"> 
    <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md"> 
        <div class="text-center mb-8"> 
            <h2 class="text-3xl font-black text-slate-900">Crear Cuenta</h2> 
            <p class="text-slate-500">Únete a nuestra plataforma educativa</p> 
        </div> 
 
        <form action="/registro" method="POST" class="space-y-6"> 
            <div> 
                <label class="block text-sm font-bold text-slate-700 mb-2">Nombre de Usuario</label> 
                <input type="text" name="username" required  
                       class="w-full p-4 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" 
                       placeholder="Ej: camilo_tutor"> 
            </div> 
            <div> 
                <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label> 
                <input type="password" name="password" required  
                       class="w-full p-4 rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" 
                       placeholder="••••••••"> 
            </div> 
            <button type="submit"  
                    class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200"> 
                Registrarse ahora 
            </button> 
        </form> 
 
        <p class="text-center mt-8 text-slate-500 text-sm"> 
            ¿Ya tienes cuenta? <a href="/login" class="text-indigo-600 font-bold hover:underline">Inicia sesión aquí</a> 
        </p> 
    </div> 
</div> 
{% endblock %}
